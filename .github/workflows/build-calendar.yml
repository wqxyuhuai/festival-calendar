name: Build festival calendar

on:
  push:
    paths:
      - "data/festivals.csv"
      - "scripts/generate_ics.py"
      - ".github/workflows/build-calendar.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate ICS
        run: python scripts/generate_ics.py

      - name: Commit generated ICS if changed
        run: |
          if git diff --quiet docs/festival_extra.ics; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/festival_extra.ics
            git commit -m "Build festival calendar"
            git push
          fi
